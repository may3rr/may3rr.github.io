<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jackie Lyu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #1d1d1f;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .center {
      text-align: center;
      opacity: 0;
      animation: fade 0.8s ease forwards;
    }
    .name {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 36px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
    }
    .entry {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .entry a {
      color: #1d1d1f;
      text-decoration: none;
      border-bottom: 2px solid #1d1d1f;
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }
    .entry a:hover { opacity: 0.5; }
    .sub {
      font-size: 13px;
      color: #86868b;
    }
    .sub a {
      color: #86868b;
      text-decoration: none;
      transition: color 0.2s;
    }
    .sub a:hover { color: #1d1d1f; }
    @keyframes fade {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="name">Jackie Lyu</div>
    <div class="entry"><a href="https://jackielyu.is-a.dev/Kouzer/" target="_blank" rel="noopener noreferrer">Kouzer</a></div>
    <div class="sub"><a href="https://github.com/may3rr" target="_blank" rel="noopener noreferrer">GitHub</a></div>
  </div>
</body>
</html>
